services:
  db:
    image: postgres:16-alpine
    env_file: .env.${ENVIRONMENT:-local}
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-app_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./sql/seeds/initial_data.sql:/docker-entrypoint-initdb.d/02_seeds.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    env_file: .env.${ENVIRONMENT:-local}
    environment:
      DB_HOST: db
      DB_PORT: 5432
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: ["main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

volumes:
  pgdata:
